name: Build & Deploy Godot RE Tools (Web)

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  GODOT_REPOSITORY: nikitalita/godot
  GODOT_REF: gdre-wb-babc272d44e
  EMSCRIPTEN_VERSION: "4.0.10"
  # SCons flags for the WEB template build
  SCONSFLAGS_WEB: >-
    warnings=no
    werror=no
    module_text_server_fb_enabled=yes
    minizip=yes
    deprecated=yes
    module_camera_enabled=no
    module_mobile_vr_enabled=no
    module_upnp_enabled=no
    module_websocket_enabled=no
    module_csg_enabled=yes
    module_gridmap_enabled=yes
    use_static_cpp=yes
    builtin_freetype=yes
    builtin_libpng=yes
    builtin_zlib=yes
    builtin_libwebp=yes
    builtin_libvorbis=yes
    builtin_libogg=yes
    disable_3d=no
    disable_godot_mono_decomp=yes
    threads=no
    production=yes
  # SCons flags for the LINUX EDITOR build (no threads=no, no web-only flags)
  SCONSFLAGS_EDITOR: >-
    warnings=no
    werror=no
    module_text_server_fb_enabled=yes
    minizip=yes
    deprecated=yes
    module_camera_enabled=no
    module_mobile_vr_enabled=no
    module_upnp_enabled=no
    module_websocket_enabled=no
    module_csg_enabled=yes
    module_gridmap_enabled=yes
    use_static_cpp=yes
    builtin_freetype=yes
    builtin_libpng=yes
    builtin_zlib=yes
    builtin_libwebp=yes
    builtin_libvorbis=yes
    builtin_libogg=yes
    disable_3d=no
    disable_godot_mono_decomp=yes
    debug_symbols=no
    accesskit=no

jobs:
  # ---------------------------------------------------------------
  # JOB 1: Build the Godot web export template (wasm)
  # ---------------------------------------------------------------
  build-template:
    name: "Build Godot Web Template"
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout gdsdecomp (this repo)
        uses: actions/checkout@v4
        with:
          path: gdsdecomp
          fetch-depth: 0

      - name: Restore cached web template
        id: cache-template
        uses: actions/cache@v4
        with:
          path: godot/bin/web_template.zip
          key: web-template-v2-${{ env.GODOT_REF }}-${{ hashFiles('gdsdecomp/**/*.cpp', 'gdsdecomp/**/*.h', 'gdsdecomp/SCsub', 'gdsdecomp/config.py') }}

      - name: Checkout Godot fork
        if: steps.cache-template.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GODOT_REPOSITORY }}
          ref: ${{ env.GODOT_REF }}
          path: godot

      - name: Symlink gdsdecomp into Godot modules
        if: steps.cache-template.outputs.cache-hit != 'true'
        run: ln -s $GITHUB_WORKSPACE/gdsdecomp $GITHUB_WORKSPACE/godot/modules/gdsdecomp

      - name: Install Linux build dependencies
        if: steps.cache-template.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential pkg-config libx11-dev libxcursor-dev \
            libxinerama-dev libgl1-mesa-dev libglu-dev libasound2-dev \
            libpulse-dev libudev-dev libxi-dev libxrandr-dev \
            libwayland-dev yasm

      - name: Set up Python 3.10
        if: steps.cache-template.outputs.cache-hit != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install SCons
        if: steps.cache-template.outputs.cache-hit != 'true'
        run: pip install scons==4.10.1

      - name: Set up Emscripten
        if: steps.cache-template.outputs.cache-hit != 'true'
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ env.EMSCRIPTEN_VERSION }}
          actions-cache-folder: "emsdk-cache"

      - name: Verify emcc
        if: steps.cache-template.outputs.cache-hit != 'true'
        run: emcc --version

      - name: Set up Rust (stable + nightly + wasm32 target)
        if: steps.cache-template.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust nightly for wasm
        if: steps.cache-template.outputs.cache-hit != 'true'
        run: |
          rustup toolchain install nightly
          rustup target add wasm32-unknown-emscripten --toolchain nightly
          rustup component add rust-src --toolchain nightly
          cargo install cbindgen --quiet

      - name: Restore SCons build cache
        if: steps.cache-template.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: /home/runner/.scons_cache
          key: scons-web-${{ env.GODOT_REF }}-${{ github.run_id }}
          restore-keys: |
            scons-web-${{ env.GODOT_REF }}-

      - name: Build Godot web template
        if: steps.cache-template.outputs.cache-hit != 'true'
        working-directory: godot
        env:
          SCONS_CACHE: /home/runner/.scons_cache
          SCONS_CACHE_LIMIT: 7168
        run: |
          scons platform=web target=template_release ${{ env.SCONSFLAGS_WEB }} -j$(nproc)

      - name: Package web template
        if: steps.cache-template.outputs.cache-hit != 'true'
        working-directory: godot
        run: |
          mkdir -p bin
          cd bin
          # Use wildcard to capture ALL web template files including the HTML shell
          # (godot.web.template_release.wasm32.nothreads.html is required for index.html output)
          echo "=== Web template files found ==="
          ls godot.web.template_release.wasm32.* 2>/dev/null || echo "(none yet)"
          zip web_template.zip godot.web.template_release.wasm32.*
          echo "=== Contents of web_template.zip ==="
          unzip -l web_template.zip
          ls -lh web_template.zip

      - name: Upload template artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-template
          path: godot/bin/web_template.zip
          retention-days: 7

  # ---------------------------------------------------------------
  # JOB 2: Build the Linux headless editor (parallel with Job 1)
  # ---------------------------------------------------------------
  build-editor:
    name: "Build Linux Editor"
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout gdsdecomp (this repo)
        uses: actions/checkout@v4
        with:
          path: gdsdecomp
          fetch-depth: 0

      - name: Restore cached Linux editor
        id: cache-editor
        uses: actions/cache@v4
        with:
          path: godot/bin/godot.linuxbsd.editor.x86_64
          key: linux-editor-${{ env.GODOT_REF }}-${{ hashFiles('gdsdecomp/**/*.cpp', 'gdsdecomp/**/*.h', 'gdsdecomp/SCsub', 'gdsdecomp/config.py') }}

      - name: Checkout Godot fork
        if: steps.cache-editor.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GODOT_REPOSITORY }}
          ref: ${{ env.GODOT_REF }}
          path: godot

      - name: Symlink gdsdecomp into Godot modules
        if: steps.cache-editor.outputs.cache-hit != 'true'
        run: ln -s $GITHUB_WORKSPACE/gdsdecomp $GITHUB_WORKSPACE/godot/modules/gdsdecomp

      - name: Install Linux build dependencies
        if: steps.cache-editor.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential pkg-config libx11-dev libxcursor-dev \
            libxinerama-dev libgl1-mesa-dev libglu-dev libasound2-dev \
            libpulse-dev libudev-dev libxi-dev libxrandr-dev \
            libwayland-dev yasm

      - name: Set up Python 3.10
        if: steps.cache-editor.outputs.cache-hit != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install SCons
        if: steps.cache-editor.outputs.cache-hit != 'true'
        run: pip install scons==4.10.1

      - name: Set up Rust (stable)
        if: steps.cache-editor.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Install cbindgen
        if: steps.cache-editor.outputs.cache-hit != 'true'
        run: cargo install cbindgen --quiet

      - name: Restore SCons build cache (editor)
        if: steps.cache-editor.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: /home/runner/.scons_cache_editor
          key: scons-editor-${{ env.GODOT_REF }}-${{ github.run_id }}
          restore-keys: |
            scons-editor-${{ env.GODOT_REF }}-

      - name: Build Linux headless editor
        if: steps.cache-editor.outputs.cache-hit != 'true'
        working-directory: godot
        env:
          SCONS_CACHE: /home/runner/.scons_cache_editor
          SCONS_CACHE_LIMIT: 7168
        run: |
          scons platform=linuxbsd target=editor arch=x86_64 \
            ${{ env.SCONSFLAGS_EDITOR }} \
            -j$(nproc)

      - name: Upload editor artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-editor
          path: godot/bin/godot.linuxbsd.editor.x86_64
          retention-days: 7

  # ---------------------------------------------------------------
  # JOB 3: Export the Godot project using the template → HTML
  # ---------------------------------------------------------------
  export-project:
    name: "Export & Deploy to GitHub Pages"
    needs: [build-template, build-editor]
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout gdsdecomp (this repo)
        uses: actions/checkout@v4

      - name: Download web template
        uses: actions/download-artifact@v4
        with:
          name: web-template
          path: web-template

      - name: Download Linux editor
        uses: actions/download-artifact@v4
        with:
          name: linux-editor
          path: godot-editor-bin

      - name: Set up Godot editor binary
        run: |
          chmod +x godot-editor-bin/godot.linuxbsd.editor.x86_64
          echo "GODOT_BIN=$(pwd)/godot-editor-bin/godot.linuxbsd.editor.x86_64" >> $GITHUB_ENV
          echo "Editor ready: $(pwd)/godot-editor-bin/godot.linuxbsd.editor.x86_64"

      - name: Prepare export directory
        run: mkdir -p exported_web

      - name: Install web export templates to Godot standard location
        run: |
          # Godot looks for templates in ~/.local/share/godot/export_templates/<version>/
          # Get version string from the editor binary (e.g. "4.7.dev.custom_build.abc1234")
          VERSION=$(${{ env.GODOT_BIN }} --version 2>&1 | head -1)
          # Template dir uses major.minor.status without custom_build suffix (e.g. "4.7.dev")
          TEMPLATE_VER=$(echo "$VERSION" | cut -d. -f1-3)
          TEMPLATE_DIR="$HOME/.local/share/godot/export_templates/$TEMPLATE_VER"
          echo "Godot version: $VERSION → template dir: $TEMPLATE_VER"
          mkdir -p "$TEMPLATE_DIR"
          cp web-template/web_template.zip "$TEMPLATE_DIR/web_nothreads_release.zip"
          cp web-template/web_template.zip "$TEMPLATE_DIR/web_nothreads_debug.zip"
          echo "Installed templates:"
          ls -lh "$TEMPLATE_DIR/"

      - name: Import project resources (first run)
        working-directory: standalone
        run: |
          ${{ env.GODOT_BIN }} --headless --import --quit 2>&1 | tail -20 || true

      - name: Export web build
        working-directory: standalone
        run: |
          ${{ env.GODOT_BIN }} --headless --export-release "Web" \
            ../exported_web/index.html 2>&1 | tail -30

      - name: Verify export output
        run: |
          echo "=== Exported files ==="
          ls -lh exported_web/
          test -f exported_web/index.html || (echo "ERROR: index.html missing!" && exit 1)
          test -f exported_web/index.wasm || (echo "ERROR: index.wasm missing!" && exit 1)

      - name: Add COOP/COEP service worker (required for SharedArrayBuffer)
        run: |
          cat > exported_web/coi-serviceworker.js << 'EOF'
          /* coi-serviceworker v0.1.7 - Marak Squires + Guido Zuidhof */
          self.addEventListener("install", () => self.skipWaiting());
          self.addEventListener("activate", (event) => event.waitUntil(self.clients.claim()));
          async function handleFetch(request) {
            if (request.cache === "only-if-cached" && request.mode !== "same-origin") return;
            const r = await fetch(request);
            const headers = new Headers(r.headers);
            headers.set("Cross-Origin-Opener-Policy", "same-origin");
            headers.set("Cross-Origin-Embedder-Policy", "require-corp");
            return new Response(r.body, { status: r.status, statusText: r.statusText, headers });
          }
          self.addEventListener("fetch", (event) => event.respondWith(handleFetch(event.request)));
          EOF

          # Inject service worker registration into the HTML
          python3 - << 'PYEOF'
          with open("exported_web/index.html", "r") as f:
              html = f.read()
          sw_script = """
          <script>
          if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
              navigator.serviceWorker.register('coi-serviceworker.js')
                .then(reg => console.log('COI SW registered'))
                .catch(err => console.warn('COI SW failed:', err));
            });
          }
          </script>
          """
          html = html.replace("</head>", sw_script + "</head>", 1)
          with open("exported_web/index.html", "w") as f:
              f.write(html)
          print("Injected COI service worker")
          PYEOF

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: exported_web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
